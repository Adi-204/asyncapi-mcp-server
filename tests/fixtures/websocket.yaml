asyncapi: 3.0.0
info:
  title: Test WebSocket Chat API
  version: 1.0.0
  description: A test AsyncAPI document for generation tests

servers:
  production:
    host: ws.example.com
    protocol: ws

channels:
  chat:
    address: /chat
    messages:
      chatMessage:
        $ref: '#/components/messages/ChatMessage'

operations:
  sendMessage:
    action: send
    channel:
      $ref: '#/channels/chat'
    messages:
      - $ref: '#/channels/chat/messages/chatMessage'
  receiveMessage:
    action: receive
    channel:
      $ref: '#/channels/chat'
    messages:
      - $ref: '#/channels/chat/messages/chatMessage'

components:
  messages:
    ChatMessage:
      contentType: application/json
      description: A chat message
      payload:
        type: object
        properties:
          text:
            type: string
          sender:
            type: string
