asyncapi: 3.0.0
info:
  title: Test Chat API
  version: 1.0.0
  description: A test AsyncAPI document for unit tests

servers:
  production:
    host: broker.example.com:1883
    protocol: mqtt

channels:
  chat:
    address: chat/messages
    messages:
      chatMessage:
        $ref: '#/components/messages/ChatMessage'

operations:
  sendMessage:
    action: send
    channel:
      $ref: '#/channels/chat'
    messages:
      - $ref: '#/channels/chat/messages/chatMessage'

components:
  messages:
    ChatMessage:
      contentType: application/json
      description: A chat message
      payload:
        type: object
        properties:
          text:
            type: string
