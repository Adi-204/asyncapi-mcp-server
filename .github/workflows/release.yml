name: Release

on:
  push:
    branches:
      - main
      - beta
      - alpha
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-nodejs:
    # Always run on manual dispatch; on push, only run when the head commit looks releasable
    # (fix:/feat:, optionally with !). semantic-release itself will skip if there's nothing to release.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' || (github.event.head_commit != null && (startsWith(github.event.head_commit.message, 'fix:') || startsWith(github.event.head_commit.message, 'fix!:') || startsWith(github.event.head_commit.message, 'feat:') || startsWith(github.event.head_commit.message, 'feat!:'))) }}
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0 https://github.com/actions/checkout/releases/tag/v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0 https://github.com/actions/setup-node/releases/tag/v6.0.0
        with:
          node-version: "24"
          check-latest: true
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: npm run lint

  release:
    needs: [test-nodejs]
    name: Publish to npm and GitHub Releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0 https://github.com/actions/checkout/releases/tag/v6.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0 https://github.com/actions/setup-node/releases/tag/v6.0.0
        with:
          node-version: "24"
          check-latest: true
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        id: release
        env:
          # Prefer RELEASE_PAT so the GitHub Release event fires downstream workflows
          # (e.g. version-bump.yml). GitHub suppresses workflow events triggered by the
          # default GITHUB_TOKEN, so without a PAT/App token the bump PR won't open
          # automatically. Falls back to GITHUB_TOKEN if RELEASE_PAT is not configured.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: npx semantic-release@25.0.2
